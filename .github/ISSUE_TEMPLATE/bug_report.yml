name: Bug report
description: Report a reproducible problem in a FastTrack script, sample, or tool.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve FastTrack. Do not include credentials, tenant data, or personal information.
  - type: input
    id: resource
    attributes:
      label: Resource
      description: Link to or provide the repository path of the affected script, sample, or tool.
      placeholder: scripts/Example/README.md
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, PowerShell/Node version, module versions, and sanitized configuration.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove secrets, tenant identifiers, personal information, and access tokens.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed sensitive information from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
